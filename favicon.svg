<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90cdf4"/>
      <stop offset="100%" style="stop-color:#63b3ed"/>
    </linearGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Beveled background -->
  <polygon points="4,0 28,0 32,4 32,28 28,32 4,32 0,28 0,4" fill="#0d1117"/>
  <polygon points="4,0 28,0 32,4 32,28 28,32 4,32 0,28 0,4"
           fill="none" stroke="rgba(99,179,237,0.35)" stroke-width="1"/>
  <!-- Top highlight -->
  <line x1="4" y1="0.5" x2="28" y2="0.5" stroke="#63b3ed" stroke-width="1" opacity="0.8"/>

  <!-- S: top bar, left vert, middle bar, right vert, bottom bar -->
  <rect x="3" y="7" width="10" height="2" fill="url(#cg)" filter="url(#fg)"/>
  <rect x="3" y="7" width="2" height="9" fill="url(#cg)" filter="url(#fg)"/>
  <rect x="3" y="14" width="10" height="2" fill="url(#cg)" filter="url(#fg)"/>
  <rect x="11" y="14" width="2" height="9" fill="url(#cg)" filter="url(#fg)"/>
  <rect x="3" y="21" width="10" height="2" fill="url(#cg)" filter="url(#fg)"/>

  <!-- K: stem + upper arm + lower arm -->
  <rect x="17" y="7" width="2" height="18" fill="url(#cg)" filter="url(#fg)"/>
  <line x1="19" y1="16" x2="27" y2="7"  stroke="url(#cg)" stroke-width="2" stroke-linecap="butt" filter="url(#fg)"/>
  <line x1="19" y1="16" x2="27" y2="25" stroke="url(#cg)" stroke-width="2" stroke-linecap="butt" filter="url(#fg)"/>

  <!-- Center divider dot -->
  <rect x="14.5" y="14.5" width="2" height="2" fill="#63b3ed" opacity="0.9" transform="rotate(45 15.5 15.5)"/>
</svg>
